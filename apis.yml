aid: ihs
name: IHS
description: >-
  IHS was a global information and analytics company providing critical
  insight to customers across industries including aerospace, defense,
  automotive, chemicals, energy, and financial services. IHS merged with
  Markit in 2016 to form IHS Markit, which was subsequently acquired by S&P
  Global in 2022. The legacy ihs.com domain now redirects to S&P Global. No
  public IHS-branded APIs are tracked here; current API offerings live within
  S&P Global product lines.
